name: Build and publish TuneRide

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: "Wersja, np. 0.2.0"
        required: true
        type: string
      version_code:
        description: "Rosnący numer całkowity, np. 2"
        required: true
        type: string
      release_notes:
        description: "Krótki opis zmian"
        required: false
        default: "Nowa wersja TuneRide"
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Pobierz kod
        uses: actions/checkout@v4

      - name: Skonfiguruj JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Skonfiguruj Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Odtwórz klucz podpisujący
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$KEYSTORE_BASE64" || (echo "Brak sekretu ANDROID_KEYSTORE_BASE64" && exit 1)
          echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/tuneride-release.jks"

      - name: Zbuduj podpisany APK
        env:
          TUNERIDE_VERSION_NAME: ${{ inputs.version_name }}
          TUNERIDE_VERSION_CODE: ${{ inputs.version_code }}
          SIGNING_KEYSTORE_PATH: ${{ runner.temp }}/tuneride-release.jks
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: gradle :app:assembleRelease --no-daemon

      - name: Przygotuj pliki wydania
        run: |
          mkdir -p release
          cp app/build/outputs/apk/release/app-release.apk "release/TuneRide-${{ inputs.version_name }}.apk"
          cd release
          sha256sum "TuneRide-${{ inputs.version_name }}.apk" > "TuneRide-${{ inputs.version_name }}.apk.sha256"

      - name: Utwórz GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version_name }}
          name: TuneRide ${{ inputs.version_name }}
          body: ${{ inputs.release_notes }}
          make_latest: true
          files: |
            release/TuneRide-${{ inputs.version_name }}.apk
            release/TuneRide-${{ inputs.version_name }}.apk.sha256
